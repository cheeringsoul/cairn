name: cairn
description: AI-powered personal learning assistant with knowledge base and spaced repetition.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0
  flutter: ^3.29.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  http: ^1.3.0
  flutter_tts: ^4.2.0
  provider: ^6.1.2
  path_provider: ^2.1.5
  path: ^1.9.0
  # Local storage
  drift: ^2.20.0
  sqlite3: ^2.4.6
  sqlite3_flutter_libs: ^0.5.24
  # Secure API key storage (iOS Keychain / Android Keystore)
  flutter_secure_storage: '>=9.2.2 <11.0.0'
  # Local UUIDs
  uuid: ^4.5.1
  # Pick markdown files for import into Library
  file_picker: '>=8.1.4 <12.0.0'
  # Render AI replies and saved items as markdown
  flutter_markdown: ^0.7.4+1
  # Share / export files via system share sheet
  share_plus: ^10.0.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  image_picker: ^1.2.1
  url_launcher: ^6.2.5
  receive_sharing_intent: ^1.8.1
  geolocator: ^13.0.0
  device_calendar: ^3.9.0
  # RSS/Atom feed parsing (direct dep — used in services/feed_service.dart)
  xml: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "logo1_fullbleed_green.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/ecdict.db

# Use the OS-provided SQLite during Dart hooks (build_runner codegen)
# so we don't need to download a prebuilt binary from GitHub. Runtime
# still uses sqlite3_flutter_libs which bundles its own copy.
hooks:
  user_defines:
    sqlite3:
      source: system
